<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>{{ TITLE }}</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; display: flex; height: 100vh; }
        #map { flex: 1; }
        #sidebar {
            width: 320px;
            background: #f8f9fa;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            overflow-y: auto;
        }
        .control-group { margin-bottom: 20px; }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover { background: #0056b3; }
        input[type=range] { width: 100%; }
        .info-box {
            background: white;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #dee2e6;
            margin-bottom: 15px;
        }
        .info-item { margin-bottom: 10px; }
        .label { font-weight: bold; color: #6c757d; font-size: 0.9em; }
        .value { font-size: 1.1em; }
        #legend {
            position: fixed;
            top: 50px;
            right: 50px;
            width: 280px;
            background-color: white;
            border: 2px solid grey;
            z-index: 9999;
            font-size: 14px;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        #running-bus-counter {
            position: fixed;
            bottom: 50px;
            right: 50px;
            width: 250px;
            background-color: white;
            border: 2px solid grey;
            z-index: 9999;
            font-size: 16px;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        #running-bus-counter h4 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #007bff;
        }
        #running-bus-count {
            font-size: 24px;
            font-weight: bold;
            color: #28a745;
        }
        .charging-bus-item {
            padding: 5px;
            margin: 3px 0;
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 3px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>{{ TITLE }}</h2>

    <div class="control-group">
        <div class="label">Huidige Tijd</div>
        <div id="time-display" class="value" style="font-size: 1.2em; margin-bottom: 10px;">--:--:--</div>
        <input type="range" id="time-slider" min="0" value="0" step="1">
        <div style="display: flex; justify-content: space-between; margin-top: 5px;">
            <button id="play-btn" onclick="togglePlay()">Afspelen</button>
            <button onclick="resetView()">Reset</button>
        </div>
    </div>

    <div class="info-box">
        <h3>Laadinfrastructuur Vermogen</h3>
        <div id="location-power-list"></div>
    </div>

    <div class="info-box">
        <h3>Ladende Bussen</h3>
        <div id="charging-bus-list"></div>
    </div>
</div>

<div id="map"></div>

<div id="legend">
    <h4 style="margin-top: 0;">Legenda</h4>
    <p style="margin:5px 0"><b>Laadinfrastructuur Vermogen:</b></p>
    <p style="margin:5px 0"><span style="color:green">●</span> Hoog vermogen (&gt;500 kW)</p>
    <p style="margin:5px 0"><span style="color:blue">●</span> Medium vermogen (200-500 kW)</p>
    <p style="margin:5px 0"><span style="color:orange">●</span> Laag vermogen (&lt;200 kW)</p>
    <hr style="margin:8px 0">
    <p style="margin:5px 0"><b>Ladende Bussen:</b></p>
    <p style="margin:5px 0">⚡ Bus aan het laden</p>
</div>

<div id="running-bus-counter">
    <h4>Rijdende Bussen</h4>
    <div id="running-bus-count">0</div>
    <p style="font-size: 0.9em; color: #6c757d; margin-top: 5px;">Bussen niet in Telexstraat</p>
</div>

<script>
    // Data injected from Python
    const minuteData = {{ MINUTE_DATA }};
    const locationData = {{ LOCATION_DATA }};
    const chargingLocationPointIds = {{ CHARGING_LOCATION_POINT_IDS }};

    // Initialize Map
    const map = L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Layers
    const locationLayer = L.layerGroup().addTo(map);
    const busLayer = L.layerGroup().addTo(map);

    // Location markers: { location_id: L.marker }
    let locationMarkers = {};
    // Bus markers: { bus_vin: L.marker }
    let busMarkers = {};

    // Time data - convert string keys to numbers and sort
    const allTimes = Object.keys(minuteData).map(ts => parseFloat(ts)).sort((a, b) => a - b);
    let currentTimeIndex = 0;
    let isPlaying = false;
    let playInterval = null;
    
    console.log(`Loaded ${allTimes.length} minute snapshots`);
    console.log(`Time range: ${allTimes.length > 0 ? new Date(allTimes[0] * 1000).toLocaleString('nl-NL', {year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit'}) : 'N/A'} - ${allTimes.length > 0 ? new Date(allTimes[allTimes.length - 1] * 1000).toLocaleString('nl-NL', {year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit'}) : 'N/A'}`);

    // Initialize location markers
    function initializeLocations() {
        locationLayer.clearLayers();
        locationMarkers = {};
        
        for (const loc of locationData) {
            const marker = L.marker([loc.lat, loc.lng], {
                icon: L.divIcon({
                    className: 'location-marker',
                    html: `<div style="background-color: #007bff; width: 20px; height: 20px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 4px rgba(0,0,0,0.6);"></div>`,
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                })
            });
            
            marker.bindPopup(`
                <div style="font-family: sans-serif; font-size: 14px;">
                    <b>Locatie:</b> ${loc.location_id}<br>
                    ${loc.point_id ? `<b>Punt ID:</b> ${loc.point_id}<br>` : ''}
                    <b>Max Vermogen:</b> ${loc.max_power_kw.toFixed(1)} kW<br>
                    <b>Connectoren:</b> ${loc.total_connectors}<br>
                    <div id="power-${loc.location_id}" style="margin-top: 5px;">
                        <b>Huidig Vermogen:</b> <span id="current-power-${loc.location_id}">0</span> kW
                    </div>
                </div>
            `);
            
            marker.addTo(locationLayer);
            locationMarkers[loc.location_id] = marker;
        }
        
        // Fit map to locations
        if (locationData.length > 0) {
            const bounds = locationData.map(loc => [loc.lat, loc.lng]);
            map.fitBounds(bounds);
        }
    }

    // Update view for a specific time
    function updateView(timestamp) {
        // Convert timestamp to string key (minuteData keys are strings)
        const timestampKey = String(timestamp);
        const snapshot = minuteData[timestampKey];
        if (!snapshot) {
            console.warn(`No snapshot found for timestamp: ${timestamp} (key: ${timestampKey})`);
            return;
        }

        // Update location power
        const locationPowerList = document.getElementById('location-power-list');
        locationPowerList.innerHTML = '';
        
        for (const loc of locationData) {
            const power = snapshot.location_power[loc.location_id] || 0;
            const maxPower = loc.max_power_kw;
            const percentage = maxPower > 0 ? (power / maxPower * 100) : 0;
            
            // Update marker popup and icon
            const marker = locationMarkers[loc.location_id];
            if (marker) {
                const popup = marker.getPopup();
                if (popup) {
                    const content = popup.getContent();
                    const updatedContent = content.replace(
                        /<span id="current-power-[^"]+">[^<]+<\/span>/,
                        `<span id="current-power-${loc.location_id}">${power.toFixed(1)}</span>`
                    );
                    popup.setContent(updatedContent);
                }
                
                // Update marker color based on power
                const powerColor = percentage > 80 ? 'red' : percentage > 50 ? 'orange' : percentage > 20 ? 'blue' : 'green';
                marker.setIcon(L.divIcon({
                    className: 'location-marker',
                    html: `<div style="background-color: ${powerColor}; width: 20px; height: 20px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 4px rgba(0,0,0,0.6);"></div>`,
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                }));
            }
            
            // Add to list
            const item = document.createElement('div');
            item.className = 'info-item';
            item.innerHTML = `
                <div class="label">${loc.location_id}</div>
                <div class="value">${power.toFixed(1)} / ${maxPower.toFixed(1)} kW (${percentage.toFixed(1)}%)</div>
            `;
            locationPowerList.appendChild(item);
        }

        // Update charging buses
        const chargingBusList = document.getElementById('charging-bus-list');
        chargingBusList.innerHTML = '';
        
        const allChargingBuses = [];
        for (const [locId, buses] of Object.entries(snapshot.charging_buses)) {
            for (const bus of buses) {
                allChargingBuses.push({...bus, location_id: locId});
            }
        }
        
        if (allChargingBuses.length === 0) {
            chargingBusList.innerHTML = '<p style="color: #6c757d; font-size: 0.9em;">Geen bussen aan het laden</p>';
        } else {
            for (const bus of allChargingBuses) {
                const item = document.createElement('div');
                item.className = 'charging-bus-item';
                item.innerHTML = `
                    <b>Bus ${bus.bus_number}</b><br>
                    SOC: ${bus.soc_percent.toFixed(1)}%<br>
                    Locatie: ${bus.location_id}
                `;
                chargingBusList.appendChild(item);
            }
        }

        // Update bus markers
        busLayer.clearLayers();
        busMarkers = {};
        
        let runningBusCount = 0;
        const buses = snapshot.buses || {};
        
        for (const [busVin, busData] of Object.entries(buses)) {
            if (!busData.location) continue;
            
            const location = busData.location;
            const pointId = location.point_id;
            
            // Count buses not at Telexstraat
            if (location.name && !location.name.toLowerCase().includes('telexstraat')) {
                runningBusCount++;
            }
            
            // Show all buses that are running (not just at charging locations)
            // Only filter if we want to show only charging location buses
            // For now, show all buses that have a location
            
            const soc = busData.soc_percent;
            const color = soc >= 60 ? '#28a745' : soc >= 40 ? '#ffc107' : soc >= 20 ? '#fd7e14' : '#dc3545';
            const iconHtml = busData.is_charging ? '⚡' : '🚌';
            
            const icon = L.divIcon({
                className: 'bus-marker',
                html: `<div style="background-color: ${color}; width: 16px; height: 16px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 4px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 10px;">${iconHtml}</div>`,
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });

            const marker = L.marker([location.latitude, location.longitude], {icon: icon});
            marker.bindPopup(`
                <div style="font-family: sans-serif; font-size: 14px;">
                    <b>Bus ${busData.bus_number}</b><br>
                    <b>Status:</b> ${busData.state}<br>
                    <b>SOC:</b> ${soc.toFixed(1)}%<br>
                    <b>Locatie:</b> ${location.name || 'N/A'}<br>
                    ${busData.is_charging ? '<b style="color: green;">⚡ Aan het laden</b>' : ''}
                </div>
            `);
            
            marker.addTo(busLayer);
            busMarkers[busVin] = marker;
        }
        
        // Update running bus count
        document.getElementById('running-bus-count').textContent = runningBusCount;
    }

    // Time control functions
    function togglePlay() {
        if (isPlaying) {
            pause();
        } else {
            play();
        }
    }

    function play() {
        isPlaying = true;
        document.getElementById('play-btn').textContent = 'Pauzeren';
        playInterval = setInterval(() => {
            if (currentTimeIndex < allTimes.length - 1) {
                currentTimeIndex++;
                updateTimeSlider();
                updateView(allTimes[currentTimeIndex]);
            } else {
                pause();
            }
        }, 1000); // Update every second (1 minute simulation time per second)
    }

    function pause() {
        isPlaying = false;
        document.getElementById('play-btn').textContent = 'Afspelen';
        if (playInterval) {
            clearInterval(playInterval);
            playInterval = null;
        }
    }

    function resetView() {
        pause();
        currentTimeIndex = 0;
        updateTimeSlider();
        updateView(allTimes[0]);
    }

    function updateTimeSlider() {
        const slider = document.getElementById('time-slider');
        slider.max = allTimes.length - 1;
        slider.value = currentTimeIndex;
        
        const timestamp = allTimes[currentTimeIndex];
        const date = new Date(timestamp * 1000);
        document.getElementById('time-display').textContent = date.toLocaleString('nl-NL', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
    }

    // Slider change handler
    document.getElementById('time-slider').addEventListener('input', (e) => {
        currentTimeIndex = parseInt(e.target.value);
        updateTimeSlider();
        updateView(allTimes[currentTimeIndex]);
        if (isPlaying) {
            pause();
        }
    });

    // Initialize
    initializeLocations();
    if (allTimes.length > 0) {
        updateTimeSlider();
        updateView(allTimes[0]);
    }
</script>
</body>
</html>
