<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bus Simulation Replay</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; display: flex; height: 100vh; }
        #map { flex: 1; }
        #sidebar {
            width: 300px;
            background: #f8f9fa;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }
        .control-group { margin-bottom: 20px; }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover { background: #0056b3; }
        input[type=range] { width: 100%; }
        .info-box {
            background: white;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #dee2e6;
        }
        .info-item { margin-bottom: 10px; }
        .label { font-weight: bold; color: #6c757d; font-size: 0.9em; }
        .value { font-size: 1.1em; }
        .soc-bar {
            height: 10px;
            background: #e9ecef;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }
        .soc-fill {
            height: 100%;
            background: #28a745;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Simulation Replay</h2>

    <div class="control-group">
        <div class="label">Current Time</div>
        <div id="time-display" class="value" style="font-size: 1.2em; margin-bottom: 10px;">--:--:--</div>
        <input type="range" id="time-slider" min="0" value="0" step="1">
        <div style="display: flex; justify-content: space-between; margin-top: 5px;">
            <button id="play-btn" onclick="togglePlay()">Play</button>
        </div>
    </div>

    <div class="info-box">
        <h3>Selected Bus Info</h3>
        <div class="info-item">
            <div class="label">Bus ID</div>
            <div id="bus-id" class="value">-</div>
        </div>
        <div class="info-item">
            <div class="label">Line Nr</div>
            <div id="line-nr" class="value">-</div>
        </div>
        <div class="info-item">
            <div class="label">Journey ID</div>
            <div id="journey-id" class="value">-</div>
        </div>
        <div class="info-item">
            <div class="label">Current Point</div>
            <div id="point-name" class="value">-</div>
        </div>
        <div class="info-item">
            <div class="label">Status</div>
            <div id="bus-status" class="value">-</div>
        </div>
        <div class="info-item">
            <div class="label">SOC</div>
            <div id="soc-text" class="value">-</div>
            <div class="soc-bar">
                <div id="soc-fill" class="soc-fill" style="width: 0%"></div>
            </div>
        </div>
    </div>
    
    <div class="info-box" style="margin-top: 20px;">
        <h3>Final Positions</h3>
        <div class="info-item">
            <div class="label">Total Buses</div>
            <div id="final-positions-count" class="value">-</div>
        </div>
        <div style="margin-top: 10px; font-size: 0.9em; color: #6c757d;">
            <em>★ Red border markers show final positions</em>
        </div>
    </div>
</div>

<div id="map"></div>

<script>
    // Data injected from Python
    const replayData = {{ REPLAY_DATA }};
    const finalPositions = {{ FINAL_POSITIONS }};

    // Initialize Map
    const map = L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Bus Markers Dictionary: { bus_id: L.marker }
    const busMarkers = {};

    // Distinct color palette for buses
    const colors = [
        '#e6194b', '#3cb44b', '#ffe119', '#4363d8', '#f58231',
        '#911eb4', '#46f0f0', '#f032e6', '#bcf60c', '#fabebe',
        '#008080', '#e6beff', '#9a6324', '#fffac8', '#800000',
        '#aaffc3', '#808000', '#ffd8b1', '#000075', '#808080',
        '#000000'
    ];

    function getBusColor(busId) {
        // Simple hash function to pick a consistent color for a bus ID
        let hash = 0;
        for (let i = 0; i < busId.length; i++) {
            hash = busId.charCodeAt(i) + ((hash << 5) - hash);
        }
        const index = Math.abs(hash) % colors.length;
        return colors[index];
    }

    function createBusIcon(color, state) {
        // Different icon styles for RUNNING vs CHARGING
        let iconShape = '50%'; // Circle for RUNNING
        let iconText = '';
        if (state === 'CHARGING') {
            iconShape = '20%'; // Square for CHARGING
            iconText = '<div style="color: white; font-size: 8px; text-align: center; line-height: 12px; font-weight: bold;">⚡</div>';
        }
        return L.divIcon({
            className: 'bus-marker',
            html: `<div style="background-color: ${color}; width: 12px; height: 12px; border-radius: ${iconShape}; border: 2px solid white; box-shadow: 0 0 4px rgba(0,0,0,0.6);">${iconText}</div>`,
            iconSize: [16, 16],
            iconAnchor: [8, 8]
        });
    }

    // State
    let currentIndex = 0;
    let isPlaying = false;
    let playInterval = null;
    const slider = document.getElementById('time-slider');
    const timeDisplay = document.getElementById('time-display');
    const playBtn = document.getElementById('play-btn');

    // Validate replay data
    if (!replayData || replayData.length === 0) {
        console.error("No replay data available!");
        alert("No replay data available. Please check if the simulation generated any data.");
        return;
    }
    
    console.log(`Loaded ${replayData.length} replay data points`);

    // Init Slider
    slider.max = replayData.length - 1;

    // Final position markers (always visible)
    const finalPositionMarkers = {};
    if (finalPositions && finalPositions.length > 0) {
        finalPositions.forEach(pos => {
            if (pos.lat && pos.lng) {
                const busId = pos.bus_id;
                const busColor = getBusColor(busId);
                // Create a special icon for final positions (larger, with a star or different shape)
                const finalIcon = L.divIcon({
                    className: 'final-position-marker',
                    html: `<div style="background-color: ${busColor}; width: 16px; height: 16px; border-radius: 50%; border: 3px solid #ff0000; box-shadow: 0 0 6px rgba(255,0,0,0.8); position: relative;">
                        <div style="position: absolute; top: -2px; left: 2px; color: white; font-size: 10px; font-weight: bold;">★</div>
                    </div>`,
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                });
                
                const popupContent = `
                    <div style="font-family: sans-serif; font-size: 14px;">
                        <strong style="color: ${busColor}; font-size: 16px;">Bus ${busId} (Final Position)</strong><br>
                        <hr style="margin: 5px 0; border: 0; border-top: 1px solid #ccc;">
                        <b>Status:</b> <span style="color: ${pos.state === 'CHARGING' ? 'green' : pos.state === 'RUNNING' ? 'blue' : 'gray'}; font-weight: bold;">${pos.state}</span><br>
                        <b>Point:</b> ${pos.point_name || 'Unknown'}<br>
                        <b>SOC:</b> ${parseFloat(pos.soc).toFixed(1)}%<br>
                        <b>Time:</b> ${pos.time_ts ? new Date(pos.time_ts * 1000).toLocaleString('nl-NL', {year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit'}) : 'N/A'}
                    </div>
                `;
                
                finalPositionMarkers[busId] = L.marker([pos.lat, pos.lng], {icon: finalIcon})
                    .addTo(map)
                    .bindPopup(popupContent);
            }
        });
        console.log(`Added ${Object.keys(finalPositionMarkers).length} final position markers`);
        // Update sidebar count
        const countElement = document.getElementById('final-positions-count');
        if (countElement) {
            countElement.textContent = Object.keys(finalPositionMarkers).length;
        }
    }

    // Set initial view
    if (replayData.length > 0) {
        const first = replayData[0];
        if (first.lat && first.lng) {
            map.setView([first.lat, first.lng], 12);
            updateView(0);
        } else {
            console.error("Invalid first data point:", first);
            // Try to find a valid point
            const validPoint = replayData.find(d => d.lat && d.lng);
            if (validPoint) {
                map.setView([validPoint.lat, validPoint.lng], 12);
                updateView(replayData.indexOf(validPoint));
            }
        }
    }

    // Functions
    function updateView(index) {
        if (index < 0 || index >= replayData.length) {
            console.warn(`Invalid index: ${index}, replayData length: ${replayData.length}`);
            return;
        }
        
        const data = replayData[index];
        if (!data) {
            console.error(`No data at index ${index}`);
            return;
        }

        // Update Time Display
        if (data.time) {
            // data.time is already formatted as 'HH:MM:SS' from Python
            // We need to convert it to include date
            // If time_ts is available, use it to get full datetime
            if (data.time_ts) {
                const date = new Date(data.time_ts * 1000);
                timeDisplay.textContent = date.toLocaleString('nl-NL', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            } else {
                timeDisplay.textContent = data.time;
            }
        }

        // Update or Create Marker for THIS bus
        const busId = data.bus_id;
        const soc = parseFloat(data.soc);
        const busColor = getBusColor(busId);
        const state = data.state || 'IDLE'; // RUNNING or CHARGING

        // Prepare Popup Content
        const popupContent = `
            <div style="font-family: sans-serif; font-size: 14px;">
                <strong style="color: ${busColor}; font-size: 16px;">Bus ${busId}</strong><br>
                <hr style="margin: 5px 0; border: 0; border-top: 1px solid #ccc;">
                <b>Status:</b> <span style="color: ${state === 'CHARGING' ? 'green' : state === 'RUNNING' ? 'blue' : 'gray'}; font-weight: bold;">${state}</span><br>
                <b>Line:</b> ${data.line_nr}<br>
                <b>Journey ID:</b> ${data.journey_id}<br>
                <b>Point:</b> ${data.point_name}<br>
                <b>SOC:</b> ${soc.toFixed(1)}%<br>
                <b>Time:</b> ${data.time_ts ? new Date(data.time_ts * 1000).toLocaleString('nl-NL', {year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit'}) : data.time}
            </div>
        `;

        if (!busMarkers[busId]) {
            // Create new marker
            busMarkers[busId] = L.marker([data.lat, data.lng], {icon: createBusIcon(busColor, state)})
                .addTo(map)
                .bindPopup(popupContent);

            // Add click event to update sidebar info
            busMarkers[busId].on('click', () => updateSidebar(data));
        } else {
            // Update existing marker
            busMarkers[busId].setLatLng([data.lat, data.lng]);
            busMarkers[busId].setIcon(createBusIcon(busColor, state)); // Update icon based on state
            busMarkers[busId].setPopupContent(popupContent);

            // If popup is open, update it immediately
            if (busMarkers[busId].isPopupOpen()) {
                busMarkers[busId].getPopup().setContent(popupContent);
            }
        }

        // Auto-update sidebar
        updateSidebar(data);

        // Update Slider
        slider.value = index;
    }

    function updateSidebar(data) {
        document.getElementById('bus-id').textContent = data.bus_id;
        document.getElementById('line-nr').textContent = data.line_nr;
        document.getElementById('journey-id').textContent = data.journey_id;
        document.getElementById('point-name').textContent = data.point_name;
        
        // Update status
        const state = data.state || 'IDLE';
        const statusEl = document.getElementById('bus-status');
        statusEl.textContent = state;
        if (state === 'CHARGING') {
            statusEl.style.color = 'green';
            statusEl.style.fontWeight = 'bold';
        } else if (state === 'RUNNING') {
            statusEl.style.color = 'blue';
            statusEl.style.fontWeight = 'bold';
        } else {
            statusEl.style.color = 'gray';
            statusEl.style.fontWeight = 'normal';
        }

        const soc = parseFloat(data.soc);
        document.getElementById('soc-text').textContent = soc.toFixed(1) + '%';
        const socFill = document.getElementById('soc-fill');
        socFill.style.width = soc + '%';

        if (soc < 30) socFill.style.backgroundColor = '#dc3545';
        else if (soc < 60) socFill.style.backgroundColor = '#ffc107';
        else socFill.style.backgroundColor = '#28a745';
    }

    function togglePlay() {
        if (isPlaying) {
            pause();
        } else {
            play();
        }
    }

    function play() {
        isPlaying = true;
        playBtn.textContent = 'Pause';
        playInterval = setInterval(() => {
            if (currentIndex < replayData.length - 1) {
                currentIndex++;
                updateView(currentIndex);
            } else {
                pause();
            }
        }, 200); // 200ms per step
    }

    function pause() {
        isPlaying = false;
        playBtn.textContent = 'Play';
        clearInterval(playInterval);
    }

    // Event Listeners
    slider.addEventListener('input', (e) => {
        currentIndex = parseInt(e.target.value);
        updateView(currentIndex);
        if (isPlaying) pause();
    });

</script>
</body>
</html>
